version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai-teaching-ppt-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app/templates:/app/app/templates
      - ai_teaching_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/ai_teaching_ppt.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: ai-teaching-ppt-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ai_teaching_data: